# Store adapters for the Galaxy Z Flip 7 (256GB) price tracker.
#
# Add a store by appending an entry. `defaults` are inherited by every store
# unless overridden. See README.md for the field reference and how to tune a
# selector when a store comes back "unavailable" on the first live run.
#
# Product tracked: Samsung Galaxy Z Flip7, 12GB RAM, 256GB, 5G (model SM-F766).
# Colours are normally priced identically; one representative colour is tracked
# per store. FE (SM-F761, 8GB) and 512GB (F766 512GB) are deliberately excluded.

defaults:
  timeout: 25
  method: jsonld            # most stores emit schema.org Product/Offer JSON-LD
  currency: EUR             # Bulgaria adopted the euro in Jan 2026
  fetch: auto               # HTTP first, headless-browser fallback if blocked/empty
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"
  accept_language: "bg-BG,bg;q=0.9,en;q=0.8"

stores:
  # ---------------------------------------------------------------------------
  # Direct retailers that emit schema.org JSON-LD and scrape cleanly over HTTP.
  # ---------------------------------------------------------------------------

  # --- TechWave: online electronics retailer (cheapest observed).
  - id: techwave
    name: "TechWave"
    enabled: true
    url: "https://techwave.bg/produkt/samsung-galaxy-z-flip-7/"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB techwave.bg цена"

  # --- TImobile: online phone retailer (Jetblack, 256GB). WooCommerce page.
  #     Its JSON-LD reports the REGULAR price (1199 €) and ignores the active
  #     discount, so read the on-page sale price instead: WooCommerce renders it
  #     inside <ins> (the struck-through regular price is in <del>). This selector
  #     targets the sale amount (e.g. 849.00 €). The € marker sets the currency.
  - id: timobile
    name: "TImobile"
    enabled: true
    url: "https://www.timobile.bg/p/samsung-galaxy-z-flip7-5g-12gb-ram-256gb-jetblack/"
    method: css
    selector: ".summary p.price ins .woocommerce-Price-amount"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB timobile.bg цена"

  # --- Ofisite (ofisitebg.com): IT & electronics online store.
  - id: ofisite
    name: "Ofisite"
    enabled: true
    url: "https://ofisitebg.com/product/smartfon-samsung-galaxy-z-flip7-5g-256gb-12gb-ram-dual-sim"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB ofisitebg.com цена"

  # --- Vega2002 (vega2002.com): mobile phone retailer, Plovdiv (F766, 256GB).
  - id: vega2002
    name: "Vega2002"
    enabled: true
    url: "https://vega2002.com/product/smartfon-gsm-samsung-galaxy-z-flip-7-f766-690-256-gb-ram-12-gb-5012-mp-5g"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB vega2002.com цена"

  # --- JAR Computers: IT & electronics retailer (Coral, 256GB).
  - id: jar
    name: "JAR Computers"
    enabled: true
    url: "https://www.jarcomputers.com/samsung-galaxy-z-flip7-12gb256gb-coral-prod-tkgsmsamsungsmf766bzrgeue.html"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB jarcomputers.com цена"

  # --- Technomarket: national electronics chain (Blue Shadow, 256GB).
  - id: technomarket
    name: "Technomarket"
    enabled: true
    url: "https://www.technomarket.bg/telefoni/samsung-galaxy-z-flip-7-256gb-5g-ds-blue-shadow-f766-09231577"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB F766 technomarket.bg цена"

  # --- samsungstore.bg: dedicated Samsung reseller.
  - id: samsungstore
    name: "samsungstore.bg"
    enabled: true
    url: "https://samsungstore.bg/samsung-f766-galaxy-z-flip7-5g-256gb"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB samsungstore.bg цена"

  # --- Ozone.bg: electronics / gaming retailer (Coral Red, 256GB).
  - id: ozone
    name: "Ozone.bg"
    enabled: true
    url: "https://www.ozone.bg/product/smartfon-gsm-samsung-galaxy-z-flip-7-f766-6-90-256-gb-ram-12-gb-50-12-mp-5g-894921/"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB ozone.bg цена"

  # --- eMAG.bg: the biggest Bulgarian e-commerce site (Jetblack, 256GB).
  - id: emag_bg
    name: "eMAG.bg"
    enabled: true
    url: "https://www.emag.bg/smartfon-samsung-galaxy-z-flip7-12gb-ram-256gb-5g-jetblack-sm-f766bzkgeue/pd/DJ5WT93BM/"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB eMAG"

  # --- Zora.bg: electronics chain (Blue, 256GB).
  - id: zora
    name: "Zora.bg"
    enabled: true
    url: "https://zora.bg/product/galaxy-z-flip-7-256gb-blue-sm-f766bdbg-12-gb-256-gb"
    currency: EUR
    search_query: "Samsung Galaxy Z Flip7 256GB SM-F766BDBG zora.bg цена"

# Stores that are reachable but do not scrape over plain HTTP were removed to
# keep the run at a clean 10/10:
#   - Technopolis, pazaruvaj.com: Cloudflare-fronted (HTTP 403); the headless
#     browser is connection-reset in the current environment.
#   - Vivacom, Yettel: cash price is rendered client-side, absent from static HTML.
# Re-add them (see git history) to run where a real browser can reach them.
